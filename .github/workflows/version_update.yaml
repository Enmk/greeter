name: Version Update workflow
on:
    push:
      branches:
        - pelumi_tech_interview

jobs: 
    Update-version:
        runs-on : ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Bump version
            - run: |
                str=$(sed -n '/#define GREETER_VERSION_PATCH/p' version.h)
                value=${str#*PATCH}
                newVersion=$((value+1))
                newVersionString="#define GREETER_VERSION_PATCH $newVersion"
                echo $newVersionString
                echo "newVersion=$((value+1))" >> "$GITHUB_ENV"
                replaceStrring="#define GREETER_VERSION_PATCH"
                sed -i 's/'"$replaceStrring.*"'/'"$newVersionString"'/' version.h

            - name: Commit
              uses: stefanzweifel/git-auto-commit-action@v5
              with:
                commit_message: Automated version minor bump
                file_pattern: "*.h"
